name: Campaign contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate campaign specification
        run: >-
          python3 scripts/bench/validate_campaign_spec.py
          campaigns/best-overall-qf-uf-2026-07.json
      - name: Test campaign validator
        run: >-
          python3 -m unittest discover -s tests
          -p 'test_validate_campaign_spec.py'
