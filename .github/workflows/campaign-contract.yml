name: Campaign contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    # Hosted execution is diagnostic. It is not production attestation unless
    # GitHub supplies and we verify an immutable runner-image identity.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12.11"
      - name: Bind workflow revision to checkout
        run: |
          test -n "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse --verify "$GITHUB_SHA^{commit}")" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Record diagnostic hosted-runner identity
        run: |
          python3 -B scripts/ci/record_hosted_runner_identity.py \
            --out "$RUNNER_TEMP/hosted-runner-identity.json"
          cat "$RUNNER_TEMP/hosted-runner-identity.json"
      - name: Validate campaign specification
        run: |
          python3 scripts/bench/validate_campaign_spec.py \
            campaigns/best-overall-qf-uf-2026-07.json
          python3 scripts/bench/validate_t3_m0_contract.py \
            campaigns/t3-m0-component-pressure-v1.json
          python3 scripts/bench/validate_t8_scalar_contract.py \
            campaigns/t8-scalar-frontier-census-v1.json \
            --p12-summary \
            results/wmi/guarded-range-census-146071/p12-range-summary.json \
            --receipt \
            results/wmi/guarded-range-census-146071/receipt.json
      - name: Test campaign validator
        run: |
          python3 -B -m unittest discover -s tests -p 'test_*.py'
      - name: Check campaign scripts
        run: |
          bash -n scripts/bench/install_solvers.sh
          bash -n scripts/wmi/euf_viper_locked_prepare.sbatch
          bash -n scripts/wmi/euf_viper_locked_shard.sbatch
          bash -n scripts/wmi/euf_viper_locked_audit.sbatch
          bash -n scripts/wmi/submit_locked_p0.sh
          bash -n scripts/wmi/submit_locked_p0_dependents.sh
          bash -n scripts/wmi/euf_viper_continuation_dispatch.sbatch
          bash -n scripts/wmi/euf_viper_continuation_shard.sbatch
          bash -n scripts/wmi/euf_viper_continuation_audit.sbatch
          bash -n scripts/wmi/euf_viper_continuation_finalize.sbatch
          bash -n scripts/wmi/submit_locked_continuations.sh
          bash -n scripts/wmi/euf_viper_certificate_prepare.sbatch
          bash -n scripts/wmi/euf_viper_certificate_shard.sbatch
          bash -n scripts/wmi/euf_viper_certificate_audit.sbatch
          bash -n scripts/wmi/submit_certificate_shadow.sh
          bash -n scripts/wmi/euf_viper_certificate_staged_audit.sbatch
          bash -n scripts/wmi/submit_staged_certificate_audit.sh
          bash -n scripts/wmi/euf_viper_typed_parser_parity_prepare.sbatch
          bash -n scripts/wmi/euf_viper_typed_parser_parity_array.sbatch
          bash -n scripts/wmi/euf_viper_typed_parser_parity_audit.sbatch
          bash -n scripts/wmi/submit_typed_parser_parity.sh
          python3 -B -m py_compile \
            scripts/ci/check_ordinary_cli_contract.py \
            scripts/ci/build_cli_baseline.py \
            scripts/ci/ordinary_cli_cases.py \
            scripts/ci/record_cli_oracle.py \
            scripts/ci/release_evidence_smoke.py \
            scripts/ci/record_hosted_runner_identity.py \
            scripts/wmi/hermetic_provenance.py \
            scripts/wmi/execution_closure.py \
            scripts/wmi/attest_sealed_build.py \
            scripts/wmi/finalize_locked_audit.py \
            scripts/wmi/sealed_linux_build.py
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Test Rust default features
        run: cargo test --locked
      - name: Test Rust no default features
        run: cargo test --locked --no-default-features
      - name: Test Rust no default features with certificates
        run: cargo test --locked --no-default-features --features certificates
      - name: Test Rust no default features with production evidence
        run: cargo test --locked --no-default-features --features production-evidence
      - name: Test Rust no default features with both evidence features
        run: cargo test --locked --no-default-features --features certificates,production-evidence
      - name: Test Rust all features
        run: cargo test --locked --all-features
      - name: Build exact combined release
        run: |
          SEALED_ROOT="$RUNNER_TEMP/euf-viper-sealed-output"
          install -d -m 0700 "$SEALED_ROOT" \
            "$RUNNER_TEMP/euf-viper-sealed-home"
          (
            set -euo pipefail
            test "${RUNNER_ENVIRONMENT:-}" = "github-hosted"
            test "${RUNNER_OS:-}" = "Linux"
            test "$(/usr/bin/id -u)" != "0"
            . /etc/os-release
            test "${ID:-}" = "ubuntu"
            test "${VERSION_ID:-}" = "24.04"

            # Ubuntu 24.04 AppArmor denies UID-map setup to unprofiled
            # processes. Open only that gate while the sealed build runs.
            USERNS_POLICY=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
            test -r "$USERNS_POLICY"
            test -x /usr/bin/sudo
            test -x /usr/sbin/sysctl
            ORIGINAL_USERNS_POLICY="$(cat "$USERNS_POLICY")"
            case "$ORIGINAL_USERNS_POLICY" in
              0|1) ;;
              *)
                printf 'sealed userns policy has unexpected value: %s\n' \
                  "$ORIGINAL_USERNS_POLICY" >&2
                exit 1
                ;;
            esac

            restore_userns_policy() {
              local status="$?"
              local current_policy=""
              local restore_needed="0"
              local restored_policy=""
              trap - EXIT
              if ! current_policy="$(cat "$USERNS_POLICY")"; then
                printf 'sealed userns policy could not be read during cleanup\n' >&2
                restore_needed="1"
                status="1"
              elif test "$current_policy" != "$ORIGINAL_USERNS_POLICY"; then
                restore_needed="1"
              fi
              if test "$restore_needed" = "1"; then
                if ! /usr/bin/sudo --non-interactive /usr/sbin/sysctl -q -w \
                  "kernel.apparmor_restrict_unprivileged_userns=$ORIGINAL_USERNS_POLICY"
                then
                  printf 'sealed userns policy restoration failed\n' >&2
                  status="1"
                fi
              fi
              if ! restored_policy="$(cat "$USERNS_POLICY")"; then
                printf 'sealed userns policy is unreadable after cleanup\n' >&2
                status="1"
              elif test "$restored_policy" != "$ORIGINAL_USERNS_POLICY"; then
                printf 'sealed userns policy restoration mismatch: %s != %s\n' \
                  "$restored_policy" "$ORIGINAL_USERNS_POLICY" >&2
                status="1"
              fi
              printf 'sealed-userns-policy phase=restored value=%s expected=%s\n' \
                "${restored_policy:-unreadable}" "$ORIGINAL_USERNS_POLICY"
              exit "$status"
            }
            trap restore_userns_policy EXIT

            printf 'sealed-userns-policy phase=before value=%s runner=%s os=%s ubuntu=%s\n' \
              "$ORIGINAL_USERNS_POLICY" "$RUNNER_ENVIRONMENT" "$RUNNER_OS" \
              "$VERSION_ID"
            if test "$ORIGINAL_USERNS_POLICY" = "1"; then
              /usr/bin/sudo --non-interactive /usr/sbin/sysctl -q -w \
                kernel.apparmor_restrict_unprivileged_userns=0
            fi
            ACTIVE_USERNS_POLICY="$(cat "$USERNS_POLICY")"
            printf 'sealed-userns-policy phase=build value=%s expected=0\n' \
              "$ACTIVE_USERNS_POLICY"
            test "$ACTIVE_USERNS_POLICY" = "0"

            python3 -B scripts/wmi/sealed_linux_build.py build \
              --repository . \
              --revision "$(git rev-parse HEAD)" \
              --artifact-dir "$SEALED_ROOT/release" \
              --staging-root "$RUNNER_TEMP/euf-viper-sealed-staging" \
              --cargo-home "$HOME/.cargo" \
              --rustup-home "$HOME/.rustup" \
              --home "$RUNNER_TEMP/euf-viper-sealed-home" \
              --git "$(command -v git)" \
              --cargo "$(rustup which cargo)" \
              --rustc "$(rustup which rustc)" \
              --unshare "$(command -v unshare)" \
              --ldd "$(command -v ldd)" \
              --cc "$(command -v cc)" \
              --cxx "$(command -v c++)" \
              --ar "$(command -v ar)" \
              --ranlib "$(command -v ranlib)" \
              --strace "$(command -v strace)" \
              --attestor scripts/wmi/attest_sealed_build.py \
              --attestor-sha256 "$(sha256sum scripts/wmi/attest_sealed_build.py | cut -d' ' -f1)"
          )
          echo "SEALED_RELEASE=$SEALED_ROOT/release" >> "$GITHUB_ENV"
          test -x "$SEALED_ROOT/release/euf-viper"
          test -x "$SEALED_ROOT/release/euf-viper-build-features"
          test -f "$SEALED_ROOT/release/sealed-build-manifest.json"
          test -f "$SEALED_ROOT/release/sealed-build-attestation.json"
          test -f "$SEALED_ROOT/release/sealed-build-receipt.json"
          test "$("$SEALED_ROOT/release/euf-viper-build-features")" = \
            "certificates,default,finite-symmetry,production-evidence"
      - name: Build independent f8d9205 CLI baseline
        run: |
          python3 -B scripts/ci/build_cli_baseline.py \
            --repository . \
            --output-dir "$RUNNER_TEMP/euf-viper-cli-baseline" \
            --cargo "$(rustup which cargo)" \
            --rustc "$(rustup which rustc)" \
            --git "$(command -v git)"
      - name: Install pinned real comparators
        run: scripts/bench/install_solvers.sh "$RUNNER_TEMP/euf-viper-solvers"
      - name: Record independent f8d9205 CLI oracle
        run: |
          python3 -B scripts/ci/record_cli_oracle.py \
            --baseline-binary "$RUNNER_TEMP/euf-viper-cli-baseline/target/release/euf-viper" \
            --baseline-receipt "$RUNNER_TEMP/euf-viper-cli-baseline/baseline-build.json" \
            --repository . \
            --out "$RUNNER_TEMP/euf-viper-cli-baseline/oracle.json"
      - name: Check exact ordinary release CLI
        run: |
          python3 -B scripts/ci/check_ordinary_cli_contract.py \
            --binary "$SEALED_RELEASE/euf-viper" \
            --repository . \
            --baseline-binary "$RUNNER_TEMP/euf-viper-cli-baseline/target/release/euf-viper" \
            --baseline-receipt "$RUNNER_TEMP/euf-viper-cli-baseline/baseline-build.json" \
            --oracle "$RUNNER_TEMP/euf-viper-cli-baseline/oracle.json"
      - name: Run real release evidence and locked campaign smoke
        run: |
          python3 -B scripts/ci/release_evidence_smoke.py \
            --repository . \
            --binary "$SEALED_RELEASE/euf-viper" \
            --feature-report "$SEALED_RELEASE/euf-viper-build-features" \
            --sealed-build-manifest "$SEALED_RELEASE/sealed-build-manifest.json" \
            --sealed-build-receipt "$SEALED_RELEASE/sealed-build-receipt.json" \
            --baseline-binary "$RUNNER_TEMP/euf-viper-cli-baseline/target/release/euf-viper" \
            --baseline-receipt "$RUNNER_TEMP/euf-viper-cli-baseline/baseline-build.json" \
            --baseline-oracle "$RUNNER_TEMP/euf-viper-cli-baseline/oracle.json" \
            --z3 "$RUNNER_TEMP/euf-viper-solvers/bin/z3" \
            --cvc5 "$RUNNER_TEMP/euf-viper-solvers/bin/cvc5" \
            --yices2 "$RUNNER_TEMP/euf-viper-solvers/bin/yices-smt2" \
            --opensmt "$RUNNER_TEMP/euf-viper-solvers/bin/opensmt"
