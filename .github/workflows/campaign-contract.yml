name: Campaign contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Initialize isolated T1 paths
        shell: bash
        run: |
          t1_root="$RUNNER_TEMP/euf-viper-t1-locked-release"
          printf '%s\n' \
            "T1_CI_ROOT=$t1_root" \
            "CARGO_HOME=$t1_root/cargo-home" \
            "CARGO_TARGET_DIR=$t1_root/target" >> "$GITHUB_ENV"
      - name: Validate campaign specification
        run: |
          python3 scripts/bench/validate_campaign_spec.py \
            campaigns/best-overall-qf-uf-2026-07.json
          python3 scripts/bench/validate_t3_m0_contract.py \
            campaigns/t3-m0-component-pressure-v1.json
          python3 scripts/bench/validate_t8_scalar_contract.py \
            campaigns/t8-scalar-frontier-census-v1.json \
            --p12-summary \
            results/wmi/guarded-range-census-146071/p12-range-summary.json \
            --receipt \
            results/wmi/guarded-range-census-146071/receipt.json
          python3 -m py_compile \
            scripts/bench/typed_parser_timing.py \
            scripts/wmi/t1_timing_build_guard.py \
            scripts/wmi/t1_timing_checkout_receipt.py \
            scripts/wmi/t1_timing_remote_submit.py
      - name: Test campaign validator
        run: |
          python3 -m unittest \
            tests.test_validate_campaign_spec \
            tests.test_validate_t3_m0_contract \
            tests.test_validate_t8_scalar_contract \
            tests.test_typed_parser_parity \
            tests.test_wmi_typed_parser_parity \
            tests.test_t1_parity_receipt \
            tests.test_typed_parser_timing \
            tests.test_wmi_t1_timing \
            tests.test_ingest_smtcomp_2025_qf_uf \
            tests.test_record_solver_config \
            tests.test_freeze_campaign \
            tests.test_shard_campaign_lock \
            tests.test_bind_campaign_cpu \
            tests.test_build_family_manifest \
            tests.test_run_locked_campaign \
            tests.test_analyze_campaign \
            tests.test_derive_timeout_continuations \
            tests.test_analyze_staged_campaign \
            tests.test_independent_qfuf \
            tests.test_shadow_campaign \
            tests.test_audit_shadow_campaign \
            tests.test_audit_staged_shadow_campaign \
            tests.test_wmi_continuation_scripts \
            tests.test_wmi_certificate_scripts
      - name: Check campaign scripts
        run: |
          bash -n scripts/bench/install_solvers.sh
          bash -n scripts/wmi/euf_viper_locked_prepare.sbatch
          bash -n scripts/wmi/euf_viper_locked_shard.sbatch
          bash -n scripts/wmi/euf_viper_locked_audit.sbatch
          bash -n scripts/wmi/submit_locked_p0.sh
          bash -n scripts/wmi/euf_viper_continuation_dispatch.sbatch
          bash -n scripts/wmi/euf_viper_continuation_shard.sbatch
          bash -n scripts/wmi/euf_viper_continuation_audit.sbatch
          bash -n scripts/wmi/euf_viper_continuation_finalize.sbatch
          bash -n scripts/wmi/submit_locked_continuations.sh
          bash -n scripts/wmi/euf_viper_certificate_prepare.sbatch
          bash -n scripts/wmi/euf_viper_certificate_shard.sbatch
          bash -n scripts/wmi/euf_viper_certificate_audit.sbatch
          bash -n scripts/wmi/submit_certificate_shadow.sh
          bash -n scripts/wmi/euf_viper_certificate_staged_audit.sbatch
          bash -n scripts/wmi/submit_staged_certificate_audit.sh
          bash -n scripts/wmi/euf_viper_typed_parser_parity_prepare.sbatch
          bash -n scripts/wmi/euf_viper_typed_parser_parity_array.sbatch
          bash -n scripts/wmi/euf_viper_typed_parser_parity_audit.sbatch
          bash -n scripts/wmi/submit_typed_parser_parity.sh
          bash -n scripts/wmi/t1_timing_common.sh
          bash -n scripts/wmi/euf_viper_t1_timing_prepare.sbatch
          bash -n scripts/wmi/euf_viper_t1_timing_array.sbatch
          bash -n scripts/wmi/euf_viper_t1_timing_audit.sbatch
          bash -n scripts/wmi/submit_t1_timing.sh
          bash -n scripts/ci/t1_timing_release_integration.sh
      - name: Build and exercise guarded T1 release
        run: scripts/ci/t1_timing_release_integration.sh
      - name: Test Rust solver
        run: |
          cargo test --locked
          cargo test --locked --all-features
