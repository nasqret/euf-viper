name: Campaign contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate campaign specification
        run: |
          python3 scripts/bench/validate_campaign_spec.py \
            campaigns/best-overall-qf-uf-2026-07.json
          python3 scripts/bench/validate_t3_m0_contract.py \
            campaigns/t3-m0-component-pressure-v1.json
          python3 scripts/bench/validate_t8_scalar_contract.py \
            campaigns/t8-scalar-frontier-census-v1.json \
            --p12-summary \
            results/wmi/guarded-range-census-146071/p12-range-summary.json \
            --receipt \
            results/wmi/guarded-range-census-146071/receipt.json
      - name: Test campaign validator
        run: |
          python3 -B -m unittest discover -s tests -p 'test_*.py'
      - name: Check campaign scripts
        run: |
          bash -n scripts/bench/install_solvers.sh
          bash -n scripts/wmi/euf_viper_locked_prepare.sbatch
          bash -n scripts/wmi/euf_viper_locked_shard.sbatch
          bash -n scripts/wmi/euf_viper_locked_audit.sbatch
          bash -n scripts/wmi/submit_locked_p0.sh
          bash -n scripts/wmi/euf_viper_continuation_dispatch.sbatch
          bash -n scripts/wmi/euf_viper_continuation_shard.sbatch
          bash -n scripts/wmi/euf_viper_continuation_audit.sbatch
          bash -n scripts/wmi/euf_viper_continuation_finalize.sbatch
          bash -n scripts/wmi/submit_locked_continuations.sh
          bash -n scripts/wmi/euf_viper_certificate_prepare.sbatch
          bash -n scripts/wmi/euf_viper_certificate_shard.sbatch
          bash -n scripts/wmi/euf_viper_certificate_audit.sbatch
          bash -n scripts/wmi/submit_certificate_shadow.sh
          bash -n scripts/wmi/euf_viper_certificate_staged_audit.sbatch
          bash -n scripts/wmi/submit_staged_certificate_audit.sh
          bash -n scripts/wmi/euf_viper_typed_parser_parity_prepare.sbatch
          bash -n scripts/wmi/euf_viper_typed_parser_parity_array.sbatch
          bash -n scripts/wmi/euf_viper_typed_parser_parity_audit.sbatch
          bash -n scripts/wmi/submit_typed_parser_parity.sh
          python3 -B -m py_compile \
            scripts/ci/check_ordinary_cli_contract.py \
            scripts/ci/release_evidence_smoke.py \
            scripts/wmi/hermetic_provenance.py
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Test Rust default features
        run: cargo test
      - name: Test Rust no default features
        run: cargo test --no-default-features
      - name: Test Rust no default features with certificates
        run: cargo test --no-default-features --features certificates
      - name: Test Rust no default features with production evidence
        run: cargo test --no-default-features --features production-evidence
      - name: Test Rust no default features with both evidence features
        run: cargo test --no-default-features --features certificates,production-evidence
      - name: Test Rust all features
        run: cargo test --all-features
      - name: Build exact combined release
        run: |
          cargo build --release --features certificates,production-evidence
          test -x target/release/euf-viper
          test -x target/release/euf-viper-build-features
          test "$(target/release/euf-viper-build-features)" = \
            "certificates,default,finite-symmetry,production-evidence"
      - name: Install pinned real comparators
        run: scripts/bench/install_solvers.sh "$RUNNER_TEMP/euf-viper-solvers"
      - name: Check exact ordinary release CLI
        run: |
          python3 -B scripts/ci/check_ordinary_cli_contract.py \
            --binary target/release/euf-viper \
            --repository . \
            --certificates
      - name: Run real release evidence and locked campaign smoke
        run: |
          python3 -B scripts/ci/release_evidence_smoke.py \
            --repository . \
            --binary target/release/euf-viper \
            --feature-report target/release/euf-viper-build-features \
            --z3 "$RUNNER_TEMP/euf-viper-solvers/bin/z3" \
            --cvc5 "$RUNNER_TEMP/euf-viper-solvers/bin/cvc5" \
            --yices2 "$RUNNER_TEMP/euf-viper-solvers/bin/yices-smt2" \
            --opensmt "$RUNNER_TEMP/euf-viper-solvers/bin/opensmt"
